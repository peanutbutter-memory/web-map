<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Display</title>

    <style>
    .flex-container {
    display: flex;
    flex-direction: column;
    background-color: rgb(86, 89, 92);
    height: auto;
    }

    .flex-container > div {
    background-color: #f1f1f1;
    width: 100%;
    height: auto;
    margin: 2px;
    line-height: 50px;
    font-size: 20px;
    }
    
    .left-justify {
      text-align: left;
      padding-left: 10px;
    }
    
    #title {text-align: center;
    font-size: 25px;}
    #map {height: 75vh;}
    #footer {text-align: center; 
      background-color: rgb(193, 214, 214);
    line-height: 1.2;}
    
    </style>

</head>

<body>

    <div class="flex-container">
        <div id="title">
            <h1>Run Inference</h1>
            <button onclick="runInference()">Run Inference</button>
        </div>
    </div>

    <script>
    function runInference() {
        fetch('/predict')
            .then(response => response.text())
            .then(data => {
                alert('Prediction Result: ' + data);
            })
            .catch(error => {
                console.error('Error:', error);
            });
    }
    </script>

</body>

</html>
